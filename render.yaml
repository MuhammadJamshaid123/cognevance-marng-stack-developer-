services:
  - type: web
    name: cognevance-portfolio-api
    runtime: node
    rootDir: cognevance_personal-portfolio/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: cognevance-tasks-api
    runtime: node
    rootDir: cognevance_task-management-system/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: "7d"
      - key: CLIENT_URL
        sync: false

  - type: web
    name: cognevance-ecommerce-api
    runtime: node
    rootDir: cognevance_ecommerce-platform/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: "7d"
      - key: CLIENT_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
